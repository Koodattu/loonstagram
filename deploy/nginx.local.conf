worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  log_format main '$remote_addr - $request_method $uri $status $body_bytes_sent "$http_user_agent"';
  access_log /var/log/nginx/access.log main;

  sendfile on;
  keepalive_timeout 65;
  client_max_body_size 64k;
  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/html;

  limit_req_zone $binary_remote_addr zone=general:10m rate=5r/s;
  limit_req_zone $binary_remote_addr zone=expensive:10m rate=30r/m;

  upstream Loonstagram_app {
    server app:3000;
  }

  server {
    listen 80;
    server_name localhost _;

    location / {
      limit_req zone=general burst=20 nodelay;
      proxy_pass http://Loonstagram_app;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-ID $request_id;
    }

    location ~ ^/(p|reel|tv|media)/ {
      limit_req zone=expensive burst=10 nodelay;
      proxy_pass http://Loonstagram_app;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-ID $request_id;
    }
  }
}
