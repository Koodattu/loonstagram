services:
  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    environment:
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:8080}
      DATABASE_PATH: /data/Loonstagram.sqlite
      MEDIA_CACHE_PATH: /data/media-cache
      MAX_MEDIA_BYTES: ${MAX_MEDIA_BYTES:-67108864}
      LISTEN_ADDR: :3000
      CACHE_SUCCESS_TTL: ${CACHE_SUCCESS_TTL:-6h}
      CACHE_NEGATIVE_TTL: ${CACHE_NEGATIVE_TTL:-15m}
      CACHE_BLOCKED_TTL: ${CACHE_BLOCKED_TTL:-5m}
      HTTP_CLIENT_TIMEOUT: ${HTTP_CLIENT_TIMEOUT:-8s}
      MEDIA_PROXY_MODE: ${MEDIA_PROXY_MODE:-redirect}
      ENABLE_INSTAGRAM_GQL_FALLBACK: ${ENABLE_INSTAGRAM_GQL_FALLBACK:-false}
      ADMIN_TOKEN: ${ADMIN_TOKEN:-}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID:-}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET:-}
      DISCORD_REDIRECT_URL: ${DISCORD_REDIRECT_URL:-}
      AUTOMATION_POLL_INTERVAL: ${AUTOMATION_POLL_INTERVAL:-5m}
      INSTAGRAM_WEB_APP_ID: ${INSTAGRAM_WEB_APP_ID:-936619743392459}
      INSTAGRAM_SESSION_ID: ${INSTAGRAM_SESSION_ID:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - app-data:/data
    expose:
      - "3000"
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx.local.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8080:80"
    depends_on:
      - app
    restart: unless-stopped

volumes:
  app-data:
