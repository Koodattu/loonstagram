<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex">
    <title>Loonstagram</title>
    <link rel="stylesheet" href="/static/app.css">
  </head>
  <body class="page-home">
    <main class="home-shell">
      <header class="home-head">
        <a class="wordmark" href="/" aria-label="Loonstagram home">Loonstagram</a>

        <form id="convert-form" class="link-fixer" novalidate>
          <label class="sr-only" for="instagram-url">Instagram URL</label>
          <div class="input-row">
            <input id="instagram-url" name="url" type="url" inputmode="url" autocomplete="off" placeholder="Instagram URL" required>
            <button id="submit-button" type="submit">Create fixed URL</button>
          </div>
          <p id="status" class="status" role="status" aria-live="polite"></p>

          <div id="result-block" class="result compact-result" hidden>
            <label class="sr-only" for="fixed-url">Fixed URL</label>
            <div class="input-row">
              <input id="fixed-url" type="text" readonly>
              <button id="copy-button" type="button">Copy URL</button>
            </div>
          </div>
        </form>
      </header>

      <section class="gallery-section" aria-label="Loonstagram gallery">
        <div id="gallery-grid" class="gallery-grid" aria-live="polite"></div>
        <p id="gallery-status" class="gallery-status" role="status"></p>
      </section>
    </main>

    <dialog id="gallery-viewer" class="viewer" aria-labelledby="viewer-title">
      <div class="viewer-shell">
        <button id="viewer-close" class="icon-button viewer-close" type="button" aria-label="Close preview">x</button>
        <button id="viewer-prev" class="icon-button viewer-edge viewer-prev" type="button" aria-label="Previous post">&lsaquo;</button>
        <article class="viewer-post">
          <div class="viewer-media-wrap">
            <div id="viewer-media" class="viewer-media"></div>
            <div id="viewer-dots" class="viewer-dots" aria-label="Post media"></div>
            <button id="viewer-media-prev" class="icon-button viewer-media-nav viewer-media-prev" type="button" aria-label="Previous image">&lsaquo;</button>
            <button id="viewer-media-next" class="icon-button viewer-media-nav viewer-media-next" type="button" aria-label="Next image">&rsaquo;</button>
          </div>
          <aside class="viewer-details">
            <h3 id="viewer-title">@loonletwow</h3>
            <p id="viewer-caption"></p>
            <div class="viewer-links">
              <a id="viewer-fixed" class="button" href="#" target="_blank" rel="noopener">Open fixed URL</a>
              <a id="viewer-original" class="button secondary" href="#" target="_blank" rel="noopener">Open Instagram</a>
            </div>
          </aside>
        </article>
        <button id="viewer-next" class="icon-button viewer-edge viewer-next" type="button" aria-label="Next post">&rsaquo;</button>
      </div>
    </dialog>

    <script src="/static/app.js" defer></script>
  </body>
</html>
