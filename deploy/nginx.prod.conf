worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  log_format main '$remote_addr - $request_method $uri $status $body_bytes_sent "$http_user_agent"';
  access_log /var/log/nginx/access.log main;

  sendfile on;
  keepalive_timeout 65;
  client_max_body_size 64k;
  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/html;

  limit_req_zone $binary_remote_addr zone=general:10m rate=5r/s;
  limit_req_zone $binary_remote_addr zone=expensive:10m rate=30r/m;
  limit_req_zone $binary_remote_addr zone=media:10m rate=180r/m;
  limit_req_status 429;

  upstream Loonstagram_app {
    server app:3000;
  }

  server {
    listen 80;
    server_name loonstagram.com www.loonstagram.com;

    location / {
      return 301 https://loonstagram.com$request_uri;
    }
  }

  server {
    listen 443 ssl;
    http2 on;
    server_name loonstagram.com www.loonstagram.com;

    ssl_certificate /etc/letsencrypt/live/loonstagram.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/loonstagram.com/privkey.pem;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    if ($host = www.loonstagram.com) {
      return 301 https://loonstagram.com$request_uri;
    }

    location / {
      limit_req zone=general burst=20 nodelay;
      proxy_pass http://Loonstagram_app;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-ID $request_id;
    }

    location ^~ /media/ {
      limit_req zone=media burst=60 nodelay;
      proxy_pass http://Loonstagram_app;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-ID $request_id;
    }

    location ~ ^/(p|reel|tv)/ {
      limit_req zone=expensive burst=10 nodelay;
      proxy_pass http://Loonstagram_app;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-ID $request_id;
    }
  }
}
